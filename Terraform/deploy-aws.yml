# .github/workflows/deploy-aws.yml
#
# Triggered on push to main (prod) or branches matching env/* (dev/staging).
# Secrets required in GitHub repository settings:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   TF_VAR_SSH_PUBLIC_KEY
#   TF_VAR_SNS_ALERT_ARN (prod only)

name: Deploy — AWS

on:
  push:
    branches:
      - main                  # → prod
      - 'env/staging'         # → staging
      - 'env/dev'             # → dev
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.7.5

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Determine environment from branch
  # ────────────────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tf_dir: ${{ steps.env.outputs.tf_dir }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "tf_dir=terraform/aws/environments/prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/env/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "tf_dir=terraform/aws/environments/staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "tf_dir=terraform/aws/environments/dev" >> $GITHUB_OUTPUT
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Lint & Test application code
  # ────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install & test backend
        working-directory: backend
        run: |
          npm ci
          npm test --if-present

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ────────────────────────────────────────────────────────────────────────────
  # Terraform Plan (runs on every push + PRs)
  # ────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    runs-on: ubuntu-latest
    needs: [setup, test]
    environment: ${{ needs.setup.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ needs.setup.outputs.tf_dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ needs.setup.outputs.environment }}.tfvars" \
            -var="ssh_public_key=${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}" \
            -var="sns_alert_arn=${{ secrets.TF_VAR_SNS_ALERT_ARN }}" \
            -out=tfplan \
            -input=false
        env:
          TF_VAR_root_domain: vaidhi.sbs

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: ${{ needs.setup.outputs.tf_dir }}/tfplan
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Terraform Apply (only on push to branch — not PRs)
  # ────────────────────────────────────────────────────────────────────────────
  terraform-apply:
    runs-on: ubuntu-latest
    needs: [setup, terraform-plan]
    if: github.event_name == 'push'
    environment: ${{ needs.setup.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ needs.setup.outputs.tf_dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: ${{ needs.setup.outputs.tf_dir }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Output deployed URL
        run: |
          echo "### ✅ Deployed to ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          terraform output -raw nginx_eip 2>/dev/null && echo "" >> $GITHUB_STEP_SUMMARY || true

  # ────────────────────────────────────────────────────────────────────────────
  # Smoke test after deploy
  # ────────────────────────────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: [setup, terraform-apply]
    steps:
      - name: Health check
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          if [ "$ENV" = "prod" ]; then
            URL="https://k8s.vaidhi.sbs"
          elif [ "$ENV" = "staging" ]; then
            URL="http://staging.vaidhi.sbs"
          else
            URL="http://dev.vaidhi.sbs"
          fi

          echo "Checking $URL/api/health ..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 10 attempts"
          exit 1
